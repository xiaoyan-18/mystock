<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyStock — POS &amp; Inventory</title>
<style>
  :root{
    --bg:#0e1524;
    --surface:#13192f;
    --card:#191e35;
    --border:#232b45;
    --primary:#0851f0;
    --primary-light:#3b82f6;
    --success:#22c55e;
    --warning:#f59e0b;
    --danger:#ef4444;
    --text:#edf3f9;
    --text-secondary:#8b93a7;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    font-size:14px;
  }
  ::-webkit-scrollbar{width:8px;height:8px;}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

  #app{display:flex;height:100vh;overflow:hidden;}

  /* ---------- Sidebar ---------- */
  #sidebar{
    width:240px;flex-shrink:0;background:var(--surface);
    display:flex;flex-direction:column;border-right:1px solid var(--border);
  }
  .brand{display:flex;align-items:center;gap:10px;padding:22px 18px 18px;}
  .brand .logo{
    width:34px;height:34px;border-radius:50%;background:var(--primary);
    display:flex;align-items:center;justify-content:center;font-size:16px;
  }
  .brand .name{font-weight:700;font-size:16px;}
  nav{flex:1;overflow-y:auto;padding:4px 12px;}
  .navitem{
    display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:8px;
    color:var(--text-secondary);cursor:pointer;margin-bottom:2px;font-weight:500;user-select:none;
  }
  .navitem:hover{background:#1a2038;}
  .navitem.active{background:rgba(8,81,240,.15);color:var(--primary-light);font-weight:600;}
  .navitem svg{width:18px;height:18px;flex-shrink:0;}
  .sidebar-footer{
    display:flex;align-items:center;gap:10px;padding:16px;border-top:1px solid var(--border);
  }
  .avatar{
    width:30px;height:30px;border-radius:50%;background:var(--primary);
    display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;
  }
  .sidebar-footer .who{flex:1;}
  .sidebar-footer .who .n{font-weight:600;font-size:13px;}
  .sidebar-footer .who .r{font-size:11px;color:var(--text-secondary);}

  /* ---------- Main ---------- */
  #main{flex:1;overflow-y:auto;}
  .page{display:none;padding:24px;}
  .page.active{display:block;}
  h1.page-title{font-size:24px;font-weight:700;margin:0 0 20px;}

  .row{display:flex;gap:16px;}
  .row.wrap{flex-wrap:wrap;}
  .grow{flex:1;min-width:0;}

  .card{
    background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;
  }

  input, select{
    background:var(--card);border:1px solid var(--border);color:var(--text);
    border-radius:10px;padding:11px 14px;font-size:14px;font-family:inherit;outline:none;
  }
  input::placeholder{color:var(--text-secondary);}
  input:focus, select:focus{border-color:var(--primary);}

  button{font-family:inherit;cursor:pointer;}
  .btn{
    background:var(--primary);color:#fff;border:none;border-radius:10px;
    padding:12px 18px;font-weight:600;font-size:14px;display:inline-flex;align-items:center;gap:8px;
  }
  .btn:hover{background:var(--primary-light);}
  .btn:disabled{opacity:.4;cursor:not-allowed;}
  .btn.danger{background:var(--danger);}
  .btn-outline{
    background:transparent;border:1px solid var(--border);color:var(--text);
    border-radius:10px;padding:11px 16px;font-weight:600;font-size:13px;display:inline-flex;align-items:center;gap:8px;
  }
  .btn-outline:hover{border-color:var(--primary);}
  .btn-icon{background:transparent;border:none;color:var(--text-secondary);padding:6px;border-radius:6px;}
  .btn-icon:hover{background:#1e2440;color:var(--text);}

  /* Dashboard */
  .stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px;}
  .stat-card .icon{
    width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;margin-bottom:14px;
  }
  .stat-card .value{font-size:22px;font-weight:700;}
  .stat-card .label{font-size:13px;color:var(--text-secondary);margin-top:2px;}
  .qa-row{display:flex;gap:12px;margin-bottom:28px;flex-wrap:wrap;}
  .list-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;}
  .list-row + .list-row{border-top:1px solid var(--border);}

  /* POS */
  #pos-layout{display:flex;height:calc(100vh - 0px);margin:-24px;}
  #pos-main{flex:1;padding:24px;overflow-y:auto;}
  #pos-cart{
    width:360px;flex-shrink:0;background:var(--surface);border-left:1px solid var(--border);
    display:flex;flex-direction:column;
  }
  .pos-header{display:flex;align-items:center;gap:16px;margin-bottom:16px;}
  .cat-scroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:10px;margin-bottom:16px;}
  .chip{
    padding:8px 16px;border-radius:20px;border:1px solid var(--border);background:var(--card);
    color:var(--text-secondary);font-weight:500;white-space:nowrap;cursor:pointer;font-size:13px;
  }
  .chip.active{background:var(--primary);color:#fff;border-color:var(--primary);}
  #product-grid{
    display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px;
  }
  .product-card{
    border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;
    background:var(--card);position:relative;transition:transform .1s;
  }
  .product-card:hover{transform:translateY(-2px);border-color:var(--primary);}
  .product-card .thumb{
    height:80px;display:flex;align-items:center;justify-content:center;font-size:28px;
  }
  .product-card .info{background:var(--primary);padding:8px 10px;}
  .product-card .info .n{font-weight:600;font-size:12.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .product-card .info .p{font-size:12px;color:rgba(255,255,255,.75);margin-top:2px;}
  .badge-qty{
    position:absolute;top:6px;right:6px;background:var(--danger);color:#fff;border-radius:50%;
    width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;
  }
  .cart-header{padding:20px;display:flex;align-items:center;}
  .cart-header h3{margin:0;font-size:18px;}
  .cart-items{flex:1;overflow-y:auto;padding:0 20px;}
  .cart-row{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid var(--border);}
  .cart-row .ci-name{font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .cart-row .ci-price{font-size:12px;color:var(--text-secondary);}
  .qty-ctrl{display:flex;align-items:center;gap:8px;}
  .qty-ctrl button{background:none;border:none;color:var(--text-secondary);font-size:16px;width:22px;}
  .cart-footer{padding:20px;border-top:1px solid var(--border);}
  .sum-row{display:flex;justify-content:space-between;padding:4px 0;color:var(--text-secondary);}
  .sum-row.total{color:var(--text);font-weight:700;font-size:16px;padding-top:10px;border-top:1px solid var(--border);margin-top:8px;}

  /* Tables */
  table{width:100%;border-collapse:collapse;}
  th{
    text-align:left;background:var(--surface);color:var(--text-secondary);font-weight:600;
    padding:12px 16px;font-size:12.5px;text-transform:uppercase;letter-spacing:.02em;
  }
  td{padding:12px 16px;border-top:1px solid var(--border);font-size:13.5px;}
  .table-wrap{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;}

  .badge{padding:4px 10px;border-radius:8px;font-size:11.5px;font-weight:700;}
  .badge.success{background:rgba(34,197,94,.15);color:var(--success);}
  .badge.warning{background:rgba(245,158,11,.15);color:var(--warning);}
  .badge.danger{background:rgba(239,68,68,.15);color:var(--danger);}

  /* Modal */
  .modal-overlay{
    position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;z-index:100;
  }
  .modal-overlay.active{display:flex;}
  .modal{
    background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px;
    width:440px;max-width:92vw;max-height:88vh;overflow-y:auto;
  }
  .modal h2{margin:0 0 18px;font-size:19px;display:flex;justify-content:space-between;align-items:center;}
  .modal .close{cursor:pointer;color:var(--text-secondary);font-size:20px;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:12.5px;color:var(--text-secondary);margin-bottom:6px;font-weight:600;}
  .field input, .field select{width:100%;}
  .field-row{display:flex;gap:12px;}
  .field-row .field{flex:1;}
  .modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:20px;}
  .switch{
    position:relative;width:42px;height:24px;background:var(--border);border-radius:12px;cursor:pointer;flex-shrink:0;
  }
  .switch.on{background:var(--primary);}
  .switch .knob{
    position:absolute;top:2px;left:2px;width:20px;height:20px;background:#fff;border-radius:50%;transition:left .15s;
  }
  .switch.on .knob{left:20px;}
  .toggle-row{display:flex;justify-content:space-between;align-items:center;}
  .perm-group-title{color:var(--primary-light);font-weight:700;font-size:12.5px;margin:14px 0 6px;text-transform:uppercase;}
  .perm-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px 10px;}
  .perm-item{display:flex;align-items:center;gap:8px;font-size:13px;padding:4px 0;}

  .empty{color:var(--text-secondary);text-align:center;padding:40px 0;}
  .toast{
    position:fixed;bottom:24px;right:24px;background:var(--card);border:1px solid var(--success);
    color:var(--success);padding:14px 20px;border-radius:10px;font-weight:600;
    box-shadow:0 8px 24px rgba(0,0,0,.4);z-index:200;opacity:0;transform:translateY(10px);
    transition:all .25s;pointer-events:none;
  }
  .toast.show{opacity:1;transform:translateY(0);}

  .method-btns{display:flex;gap:8px;margin:10px 0 16px;}
  .method-btn{
    flex:1;padding:10px;border-radius:10px;border:1px solid var(--border);background:transparent;
    color:var(--text-secondary);font-weight:600;font-size:12.5px;
  }
  .method-btn.active{background:rgba(8,81,240,.15);border-color:var(--primary);color:var(--primary-light);}
  .amount-due{
    background:var(--bg);border-radius:10px;padding:14px;text-align:center;margin-bottom:16px;
  }
  .amount-due .lbl{color:var(--text-secondary);font-size:12.5px;}
  .amount-due .val{font-size:24px;font-weight:700;color:var(--primary-light);}

  .progress-bar{background:var(--border);border-radius:4px;height:6px;overflow:hidden;margin-top:6px;}
  .progress-bar .fill{background:var(--primary-light);height:100%;}

  .mini-stat{flex:1;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;}
  .mini-stat .lbl{color:var(--text-secondary);font-size:12px;}
  .mini-stat .val{font-weight:700;font-size:16px;margin-top:4px;}

  #hamburger{display:none;background:none;border:none;color:var(--text);font-size:22px;padding:10px 16px;}
  @media(max-width:900px){
    #sidebar{position:fixed;left:-260px;top:0;bottom:0;z-index:150;transition:left .2s;}
    #sidebar.open{left:0;}
    #hamburger{display:block;}
    .stat-grid{grid-template-columns:repeat(2,1fr);}
    #pos-cart{position:fixed;right:-380px;top:0;bottom:0;transition:right .2s;z-index:60;}
    #pos-cart.open{right:0;}
  }

  /* ---------- Login ---------- */
  #login-screen{
    position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;
    z-index:500;padding:20px;
  }
  #login-screen.hidden{display:none;}
  .login-card{
    width:100%;max-width:360px;background:var(--card);border:1px solid var(--border);
    border-radius:16px;padding:32px 28px;
  }
  .login-card .logo{
    width:52px;height:52px;border-radius:50%;background:var(--primary);
    display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 18px;
  }
  .login-card h2{text-align:center;margin:0 0 6px;font-size:20px;}
  .login-card .sub{text-align:center;color:var(--text-secondary);font-size:13px;margin-bottom:24px;}
  .login-card .field{margin-bottom:14px;}
  .login-card .field label{display:block;font-size:12.5px;color:var(--text-secondary);margin-bottom:6px;}
  .login-card .field input{width:100%;}
  .login-card .btn{width:100%;justify-content:center;margin-top:6px;}
  .login-error{
    background:rgba(239,68,68,.12);border:1px solid var(--danger);color:var(--danger);
    border-radius:8px;padding:10px 12px;font-size:12.5px;margin-bottom:14px;display:none;
  }
  .login-error.show{display:block;}
  #app.hidden{display:none;}
</style>
</head>
<body>
<div id="login-screen">
  <div class="login-card">
    <div class="logo">🏬</div>
    <h2>MyStock Login</h2>
    <div class="sub">Sign in to access your store data</div>
    <div class="login-error" id="login-error">Incorrect email or password.</div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="you@example.com" autocomplete="username">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="login-password" placeholder="Enter your password" autocomplete="current-password">
    </div>
    <button class="btn" onclick="attemptLogin()">Sign In</button>
  </div>
</div>

<div id="app" class="hidden">

  <aside id="sidebar"></aside>
  <main id="main">
    <button id="hamburger" onclick="document.getElementById('sidebar').classList.toggle('open')">&#9776;</button>
    <div id="page-dashboard" class="page"></div>
    <div id="page-pos" class="page"></div>
    <div id="page-products" class="page"></div>
    <div id="page-categories" class="page"></div>
    <div id="page-customers" class="page"></div>
    <div id="page-sales" class="page"></div>
    <div id="page-inventory" class="page"></div>
    <div id="page-staff" class="page"></div>
    <div id="page-shifts" class="page"></div>
    <div id="page-reports" class="page"></div>
    <div id="page-settings" class="page"></div>
  </main>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal-body"></div>
</div>
<div class="toast" id="toast"></div>

<script>
/* ============================= ICONS ============================= */
const ICONS = {
  dashboard:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>',
  pos:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>',
  products:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 7L12 3 4 7m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>',
  categories:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l9 4.9-9 4.9-9-4.9L12 2z"/><path d="M3 12l9 4.9 9-4.9M3 17l9 4.9 9-4.9"/></svg>',
  customers:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>',
  sales:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M16 13H8m8 4H8m2-8H8"/></svg>',
  inventory:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M9 22V12h6v10"/></svg>',
  staff:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.59 13.41L13.42 20.6a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>',
  shifts:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>',
  reports:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>',
  settings:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>',
};
const FOOD_EMOJI = {'Burgers':'🍔','Chicken & Wings':'🍗','Pizza':'🍕','Drinks & Desserts':'🍰','Café':'☕'};

/* ============================= STATE ============================= */
const uid = () => Math.random().toString(36).slice(2,10);

const state = {
  storeName:'Shop X',
  taxRate:10.0,
  currency:'$',
  darkMode:true,
  page:'dashboard',
  categories:['Burgers','Chicken & Wings','Pizza','Drinks & Desserts','Café'],
  products:[
    {id:uid(),name:'Chocolate Milkshake',category:'Drinks & Desserts',price:5.04,cost:2.10,stock:3,low:5,emoji:'🥤'},
    {id:uid(),name:'Strawberry Milkshake',category:'Drinks & Desserts',price:4.99,cost:2.00,stock:1,low:5,emoji:'🥤'},
    {id:uid(),name:'Vanilla Sundae Treat',category:'Drinks & Desserts',price:7.49,cost:3.00,stock:3,low:5,emoji:'🍨'},
    {id:uid(),name:'BBQ Chicken Pizza',category:'Pizza',price:13.59,cost:6.00,stock:20,low:5,emoji:'🍕'},
    {id:uid(),name:'Cappuccino',category:'Café',price:3.50,cost:1.10,stock:40,low:5,emoji:'☕'},
    {id:uid(),name:'Chicken Wings & Fries',category:'Chicken & Wings',price:14.85,cost:6.50,stock:25,low:5,emoji:'🍗'},
    {id:uid(),name:'Chocolate Croissant',category:'Café',price:3.26,cost:1.20,stock:18,low:5,emoji:'🥐'},
    {id:uid(),name:'Classic Beef Burger',category:'Burgers',price:7.89,cost:3.50,stock:30,low:5,emoji:'🍔'},
    {id:uid(),name:'Coca Cola 350ml',category:'Drinks & Desserts',price:0.89,cost:0.30,stock:93,low:5,emoji:'🥤'},
    {id:uid(),name:'Crispy Chicken Burger',category:'Burgers',price:8.59,cost:3.80,stock:22,low:5,emoji:'🍔'},
    {id:uid(),name:'Double Cheese Burger',category:'Burgers',price:8.89,cost:4.00,stock:15,low:5,emoji:'🍔'},
    {id:uid(),name:'Fried Chicken Bucket',category:'Chicken & Wings',price:18.95,cost:8.50,stock:12,low:5,emoji:'🍗'},
  ],
  cart:[], // {productId, qty}
  discount:0,
  sales:[],
  customers:[],
  staff:[{id:uid(),name:'Admin',role:'Owner',perms:['all']}],
  activeShift:null,
  shiftHistory:[],
  cashMovements:[],
  posCategory:'All',
  posSearch:'',
};

/* ============================= PERSISTENCE ============================= */
const STORAGE_KEY = 'mystock_data_v1';

function saveState(){
  try{
    const toSave = {
      storeName: state.storeName,
      taxRate: state.taxRate,
      currency: state.currency,
      darkMode: state.darkMode,
      categories: state.categories,
      products: state.products,
      sales: state.sales,
      customers: state.customers,
      staff: state.staff,
      activeShift: state.activeShift,
      shiftHistory: state.shiftHistory,
      cashMovements: state.cashMovements,
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(toSave));
  }catch(e){
    console.error('Could not save data:', e);
  }
}

function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return;
    const saved = JSON.parse(raw);
    Object.keys(saved).forEach(key=>{
      state[key] = saved[key];
    });
  }catch(e){
    console.error('Could not load saved data:', e);
  }
}

function resetAllData(){
  if(!confirm('This will erase ALL saved data (products, sales, customers, etc.) and cannot be undone. Continue?')) return;
  localStorage.removeItem(STORAGE_KEY);
  location.reload();
}

function exportBackup(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw){ toast('No data to export yet'); return; }
    const blob = new Blob([raw], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'mystock-backup-' + new Date().toISOString().slice(0,10) + '.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    toast('Backup downloaded');
  }catch(e){
    console.error('Export failed:', e);
    toast('Export failed');
  }
}

function importBackupFile(input){
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e){
    try{
      const parsed = JSON.parse(e.target.result);
      Object.keys(parsed).forEach(key=>{ state[key] = parsed[key]; });
      saveState();
      render();
      toast('Backup restored successfully');
    }catch(err){
      console.error('Import failed:', err);
      toast('Invalid backup file');
    }
  };
  reader.readAsText(file);
  input.value = '';
}

function closeModal(){ document.getElementById('modal-overlay').classList.remove('active'); }

}

function cartSubtotal(){ return state.cart.reduce((s,c)=> s + productById(c.productId).price*c.qty, 0); }
function cartTax(){ return cartSubtotal() * (state.taxRate/100); }
function cartTotal(){ return cartSubtotal() + cartTax() - state.discount; }
function productById(id){ return state.products.find(p=>p.id===id); }

function addToCart(id){
  const existing = state.cart.find(c=>c.productId===id);
  if(existing) existing.qty++; else state.cart.push({productId:id, qty:1});
  render();
}
function incCart(id){ state.cart.find(c=>c.productId===id).qty++; render(); }
function decCart(id){
  const item = state.cart.find(c=>c.productId===id);
  if(item.qty>1) item.qty--; else state.cart = state.cart.filter(c=>c.productId!==id);
  render();
}

  const out = state.products.filter(p=>p.stock<=0);
  const ok = state.products.filter(p=>p.stock>p.low);
  function statusBadge(p){
    if(p.stock<=0) return '<span class="badge danger">Out of Stock</span>';
    if(p.stock<=p.low) return '<span class="badge warning">Low Stock</span>';
    return '<span class="badge success">In Stock</span>';
  }
  document.getElementById('page-inventory').innerHTML = `
    <h1 class="page-title">Inventory</h1>
    <div class="row" style="margin-bottom:20px;">
      <div class="grow card" style="border-color:rgba(245,158,11,.4);background:rgba(245,158,11,.08);">⚠️ <b>${low.length}</b> Low Stock</div>
      <div class="grow card" style="border-color:rgba(239,68,68,.4);background:rgba(239,68,68,.08);">🚫 <b>${out.length}</b> Out of Stock</div>
      <div class="grow card" style="border-color:rgba(34,197,94,.4);background:rgba(34,197,94,.08);">📦 <b>${ok.length}</b> In Stock</div>
    </div>
    <div class="table-wrap"><table>
      <thead><tr><th>Product</th><th>Stock</th><th>Status</th><th>Adjust</th></tr></thead>
      <tbody>
        ${state.products.map(p=>`
          <tr>
            <td>${p.name}</td>
            <td>${p.stock}</td>
            <td>${statusBadge(p)}</td>
            <td>
              <button class="btn-icon" onclick="adjustStock('${p.id}',-1)">➖</button>
              <button class="btn-icon" onclick="adjustStock('${p.id}',1)">➕</button>
            </td>
          </tr>`).join('')}
      </tbody>
    </table></div>`;
}
function adjustStock(id,delta){
  const p = productById(id);
  p.stock = Math.max(0,p.stock+delta);
  renderInventory();
}

/* ============================= STAFF ============================= */
const PERMISSION_GROUPS = {
  'Sales':['Process sales','Apply discounts','Refund sales'],
  'Customers':['View customers','Update customers','Delete customers'],
  'Reports':['View reports','Generate reports'],
  'Shifts':['Open shift','Close shift','Add cash in','Add cash out'],
  'Staff':['View staff','Create staff','Update staff','Delete staff'],
  'Settings':['Manage settings'],
};
function renderStaff(){
  document.getElementById('page-staff').innerHTML = `
    <div class="pos-header">
      <h1 class="page-title" style="margin:0;">Staff (${state.staff.length})</h1>
      <div class="grow"></div>
      <button class="btn" onclick="showStaffModal()">+ New Staff</button>
    </div>
    ${state.staff.map(s=>`
      <div class="card row" style="margin-bottom:10px;align-items:center;">
        <div class="avatar">${s.name[0]}</div>
        <div class="grow" style="margin-left:14px;">
          <div style="font-weight:600;">${s.name}</div>
          <div style="color:var(--text-secondary);font-size:12px;">${s.role}</div>
        </div>
        <div style="color:var(--text-secondary);font-size:12px;">${s.perms.length} permissions</div>
      </div>`).join('')}`;
}
function showStaffModal(){
  const groupsHtml = Object.entries(PERMISSION_GROUPS).map(([group,perms])=>`
    <div class="perm-group-title">${group}</div>
    <div class="perm-grid">
      ${perms.map(perm=>`<label class="perm-item"><input type="checkbox" value="${perm}" class="perm-cb"> ${perm}</label>`).join('')}
    </div>`).join('');
  openModal(`
    <h2>New Staff<span class="close" onclick="closeModal()">&times;</span></h2>
    <div class="field"><label>Name</label><input id="st-name"></div>
    <div class="field"><label>Role</label><input id="st-role" value="Cashier"></div>
    <div style="max-height:260px;overflow-y:auto;border-top:1px solid var(--border);padding-top:6px;">${groupsHtml}</div>
    <div class="modal-actions">
      <button class="btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn" onclick="saveStaff()">Save</button>
    </div>`);
}
function saveStaff(){
  const name = document.getElementById('st-name').value.trim();
  const role = document.getElementById('st-role').value.trim();
  const perms = Array.from(document.querySelectorAll('.perm-cb:checked')).map(cb=>cb.value);
  if(name) state.staff.push({id:uid(),name,role,perms});
  closeModal();
  renderStaff();
}

/* ============================= SHIFTS ============================= */
function openShift(){
  state.activeShift = {id:uid(),terminal:'Terminal 1',openedBy:'Admin',openedAt:new Date(),startingCash:0,cashIn:0,cashOut:0,totalSales:0};
}
function closeShiftFn(){
  state.activeShift.closedAt = new Date();
  state.shiftHistory.unshift(state.activeShift);
  state.activeShift = null;
  renderShifts();
}
function renderShifts(){
  const s = state.activeShift;
  document.getElementById('page-shifts').innerHTML = `
    <div class="pos-header">
      <h1 class="page-title" style="margin:0;">Shifts</h1>
      <div class="grow"></div>
      ${s? `<button class="btn danger" onclick="closeShiftFn()">🔒 Close Shift</button>`
          : `<button class="btn" onclick="openShift(); renderShifts();">🔓 Open Shift</button>`}
    </div>
    ${s? `
      <div class="card" style="border-color:rgba(34,197,94,.4);background:rgba(34,197,94,.08);color:var(--success);font-weight:600;margin-bottom:20px;">
        🟢 Active Shift &nbsp;•&nbsp; Opened by: ${s.openedBy} &nbsp;•&nbsp; Total Sales: ${money(s.totalSales)}
      </div>
      <div class="pos-header">
        <div style="font-weight:600;font-size:16px;">Cash Movements</div>
        <div class="grow"></div>
        <button class="btn-outline" style="color:var(--success)" onclick="showCashModal('Cash In')">⬇ Cash In</button>
        <button class="btn-outline" style="color:var(--danger)" onclick="showCashModal('Cash Out')">⬆ Cash Out</button>
      </div>
      <div class="row" style="margin-bottom:16px;">
        <div class="mini-stat"><div class="lbl">Starting Cash</div><div class="val" style="color:#3b82f6">${money(s.startingCash)}</div></div>
        <div class="mini-stat"><div class="lbl">Cash In</div><div class="val" style="color:var(--success)">${money(s.cashIn)}</div></div>
        <div class="mini-stat"><div class="lbl">Cash Out</div><div class="val" style="color:var(--danger)">${money(s.cashOut)}</div></div>
        <div class="mini-stat"><div class="lbl">Expected Cash</div><div class="val" style="color:var(--warning)">${money(s.startingCash+s.cashIn-s.cashOut+s.totalSales)}</div></div>
      </div>
      ${state.cashMovements.map(m=>`
        <div class="card" style="margin-bottom:10px;display:flex;align-items:center;gap:12px;">
          <div>${m.type==='Cash In'?'⬇️':'⬆️'}</div>
          <div class="grow">
            <div style="font-weight:600;font-size:13px;">${m.type} &nbsp;•&nbsp; ${new Date(m.date).toLocaleString()}</div>
            <div style="color:var(--text-secondary);font-size:12px;">${m.note}</div>
          </div>
          <div style="font-weight:700;color:${m.type==='Cash In'?'var(--success)':'var(--danger)'}">${m.type==='Cash In'?'+':'-'}${money(m.amount)}</div>
        </div>`).join('')}
    ` : '<div class="empty">No active shift. Open a shift to start tracking cash movements.</div>'}`;
}
function showCashModal(type){
  openModal(`
    <h2>${type}<span class="close" onclick="closeModal()">&times;</span></h2>
    <div class="field"><label>Amount</label><input type="number" id="cm-amount"></div>
    <div class="field"><label>Note</label><input id="cm-note"></div>
    <div class="modal-actions">
      <button class="btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn" onclick="saveCashMovement('${type}')">Confirm</button>
    </div>`);
}
function saveCashMovement(type){
  const amount = parseFloat(document.getElementById('cm-amount').value)||0;
  const note = document.getElementById('cm-note').value.trim() || type;
  if(amount>0){
    state.cashMovements.unshift({type,date:new Date(),note,amount,by:'Admin'});
    if(type==='Cash In') state.activeShift.cashIn += amount; else state.activeShift.cashOut += amount;
  }
  closeModal();
  renderShifts();
}

/* ============================= REPORTS ============================= */
function renderReports(){
  const totalRevenue = state.sales.reduce((s,x)=>s+x.total,0);
  const estProfit = totalRevenue*0.56;
  const avgSale = state.sales.length? totalRevenue/state.sales.length : 0;
  const counts = {};
  state.sales.forEach(s=>s.items.forEach(i=>{counts[i.name]=(counts[i.name]||0)+i.qty;}));
  const top = Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,10);
  const maxCount = top.length? top[0][1] : 1;
  const byMethod = {};
  state.sales.forEach(s=>{byMethod[s.paymentMethod]=(byMethod[s.paymentMethod]||0)+s.total;});
  const totalByMethod = Object.values(byMethod).reduce((a,b)=>a+b,0);

  document.getElementById('page-reports').innerHTML = `
    <h1 class="page-title">Reports</h1>
    <div class="stat-grid">
      <div class="card stat-card"><div class="icon" style="background:rgba(59,130,246,.15)">💰</div><div class="value">${money(totalRevenue)}</div><div class="label">Total Revenue</div></div>
      <div class="card stat-card"><div class="icon" style="background:rgba(34,197,94,.15)">📈</div><div class="value">${money(estProfit)}</div><div class="label">Estimated Profit</div></div>
      <div class="card stat-card"><div class="icon" style="background:rgba(245,158,11,.15)">🧾</div><div class="value">${state.sales.length}</div><div class="label">Number of Sales</div></div>
      <div class="card stat-card"><div class="icon" style="background:rgba(168,85,247,.15)">🥧</div><div class="value">${money(avgSale)}</div><div class="label">Average Sale</div></div>
    </div>
    <div class="row wrap">
      <div class="card grow" style="min-width:320px;">
        <div style="font-weight:600;margin-bottom:14px;">Top Products</div>
        ${top.length? top.map(([name,count],i)=>`
          <div style="margin-bottom:10px;">
            <div style="display:flex;justify-content:space-between;font-size:13px;">
              <span>${i+1}. ${name}</span><span style="color:var(--primary-light);font-weight:600;">${count} sold</span>
            </div>
            <div class="progress-bar"><div class="fill" style="width:${(count/maxCount*100)}%"></div></div>
          </div>`).join('') : '<div class="empty">No sales data yet</div>'}
      </div>
      <div class="card" style="min-width:260px;">
        <div style="font-weight:600;margin-bottom:14px;">Sales by Payment Method</div>
        ${Object.keys(byMethod).length? Object.entries(byMethod).map(([m,v])=>`
          <div class="list-row"><span>${m}</span><span style="font-weight:600;">${money(v)}</span><span style="color:var(--text-secondary);">${totalByMethod? Math.round(v/totalByMethod*100):0}%</span></div>
        `).join('') : '<div class="empty">No sales data yet</div>'}
      </div>
    </div>`;
}

/* ============================= SETTINGS ============================= */
function renderSettings(){
  document.getElementById('page-settings').innerHTML = `
    <h1 class="page-title">Settings</h1>
    <div class="row wrap">
      <div class="card grow" style="min-width:320px;">
        <div style="font-weight:600;margin-bottom:16px;">Business Information</div>
        <div class="field"><label>Store Name</label><input id="set-store" value="${state.storeName}"></div>
        <div class="field-row">
          <div class="field"><label>Currency Symbol</label><input id="set-currency" value="${state.currency}"></div>
          <div class="field"><label>Tax Rate %</label><input id="set-tax" type="number" value="${state.taxRate}"></div>
        </div>
        <button class="btn" onclick="saveSettings()">Save Settings</button>
      </div>
      <div style="width:280px;display:flex;flex-direction:column;gap:16px;">
        <div class="card">
          <div style="font-weight:600;margin-bottom:14px;">Appearance</div>
          <div class="toggle-row"><span>Dark Mode</span><div class="switch on" onclick="toast('This demo is dark-mode only')"><div class="knob"></div></div></div>
        </div>
        <div class="card">
          <div style="font-weight:600;margin-bottom:10px;">About</div>
          <div style="color:var(--text-secondary);">Version: v1.0.0</div>
          <div style="color:var(--text-secondary);">System name: MyStock</div>
        </div>
        <div class="card">
          <div style="font-weight:600;margin-bottom:10px;">Backup & Restore</div>
          <div style="color:var(--text-secondary);margin-bottom:12px;font-size:12.5px;">Download a backup file regularly. If your browser ever clears its storage, you can restore from this file.</div>
          <button class="btn-outline" style="width:100%;justify-content:center;margin-bottom:10px;" onclick="exportBackup()">⬇️ Export Backup</button>
          <label class="btn-outline" style="width:100%;justify-content:center;cursor:pointer;">
            ⬆️ Import Backup
            <input type="file" accept="application/json" style="display:none" onchange="importBackupFile(this)">
          </label>
        </div>
        <div class="card">
          <div style="font-weight:600;margin-bottom:10px;">Data</div>
          <div style="color:var(--text-secondary);margin-bottom:12px;font-size:12.5px;">All data is saved automatically in this browser. Export a backup so it's never lost.</div>
          <button class="btn danger" onclick="resetAllData()">🗑️ Reset All Data</button>
        </div>
      </div>
    </div>`;
}
function saveSettings(){
  state.storeName = document.getElementById('set-store').value || state.storeName;
  state.currency = document.getElementById('set-currency').value || state.currency;
  state.taxRate = parseFloat(document.getElementById('set-tax').value) || state.taxRate;
  toast('Settings saved');
  render();
}

/* ============================= MASTER RENDER ============================= */
function render(){
  saveState();
  renderSidebar();
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+state.page).classList.add('active');
  switch(state.page){
    case 'dashboard': renderDashboard(); break;
    case 'pos': renderPos(); break;
    case 'products': renderProducts(); break;
    case 'categories': renderCategories(); break;
    case 'customers': renderCustomers(); break;
    case 'sales': renderSales(); break;
    case 'inventory': renderInventory(); break;
    case 'staff': renderStaff(); break;
    case 'shifts': renderShifts(); break;
    case 'reports': renderReports(); break;
    case 'settings': renderSettings(); break;
  }
}

/* ============================= AUTO LOGIN ============================= */
if(localStorage.getItem(SESSION_KEY) === '1'){
  showApp();
}
</script>
</body>
</html>
